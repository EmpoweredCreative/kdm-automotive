# Add these inside the same `server { }` block as your SSL and Forge includes.
#
# Order matters: `location /api/` must appear *before* `location /` so POST /api/quote
# hits Node instead of the SPA.
#
# CRITICAL: `proxy_pass` must be EXACTLY `http://127.0.0.1:8787` with NO trailing slash.
# If you use `http://127.0.0.1:8787/` nginx strips `/api` and Express used to see `/quote`
# only (404). The app now accepts both paths, but correct nginx is still best.
#
# Prerequisite: Node API listening on 127.0.0.1:8787 (e.g. `pm2 start ecosystem.config.cjs`
# from the site `current` directory, with SendGrid env vars loaded).

location /api/ {
    proxy_pass http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# React/Vite SPA — must end with `/index.html` (leading slash), NOT `=index.html`
# (`=index.html` is invalid and breaks routing).
location / {
    try_files $uri $uri/ /index.html;
}
